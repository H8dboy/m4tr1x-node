name: M4TR1X Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: '*.deb'
          - os: windows-latest
            platform: win
            artifact: '*.exe'
          - os: macos-latest
            platform: mac
            artifact: '*.dmg'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python (for node-gyp)
        uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: '3.11'

      - name: Install Python setuptools (distutils fix for Python 3.12+)
        run: python -m pip install setuptools

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libfuse2 rpm

      - name: Install dependencies
        run: npm ci

      - name: Create models dir
        run: |
          node -e "require('fs').mkdirSync('models', {recursive: true})"

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3
        env:
          npm_config_build_from_source: true
          npm_config_python: ${{ steps.setup-python.outputs.python-path }}

      - name: Build (${{ matrix.platform }})
        run: npm run build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: 1

      - name: Generate checksums (Linux/Mac)
        if: matrix.os != 'windows-latest'
        run: |
          cd dist
          find . -maxdepth 1 \( -name "*.AppImage" -o -name "*.dmg" -o -name "*.deb" \) \
            -exec sha256sum {} \; > checksums-${{ matrix.platform }}.txt || true

      - name: Generate checksums (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd dist
          Get-ChildItem -Filter "*.exe" | ForEach-Object {
            $hash = (Get-FileHash $_.Name -Algorithm SHA256).Hash
            "$hash  $($_.Name)" | Out-File -Append checksums-win.txt
          }

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/${{ matrix.artifact }}
            dist/checksums-*.txt
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Security audit
        run: npm audit --audit-level=critical || true
