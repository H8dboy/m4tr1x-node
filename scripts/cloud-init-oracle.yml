#cloud-config
#
# M4TR1X — cloud-init per Oracle Cloud (OCI Always Free) — versione HARDENED
#
# Al primo boot la VM diventa: nodo M4TR1X (:8080) + head server (:8081) +
# relay Nostr (:4848), tutto come servizi systemd.
#
# Postura di sicurezza (decisa 2026-06-19):
#  - relay Nostr :4848  → PUBBLICO (un relay è fatto per esserlo)
#  - node API  :8080    → resta LOCALE; aprilo nella Security List solo
#                         deliberatamente, quando vuoi l'API pubblica
#  - head + dashboard :8081 → LOCALE (HOST=127.0.0.1): NON è autenticato,
#                         quindi non va MAI esposto a Internet
#  - M4TR1X_API_KEY casuale generata al primo boot (protegge le route sensibili)
#  - iptables apre SOLO 4848
#
# Dashboard / API in locale: raggiungili via tunnel SSH, es.
#   ssh -L 8081:localhost:8081 -L 8080:localhost:8080 ubuntu@<PUBLIC_IP>
#
# RICORDA: oltre a iptables, apri 4848 anche nella Security List della VCN.

package_update: true
packages:
  - git
  - curl

runcmd:
  # ── Firewall locale: apri SOLO il relay pubblico ──
  - iptables -I INPUT -p tcp --dport 4848 -j ACCEPT
  - sh -c 'command -v netfilter-persistent >/dev/null && netfilter-persistent save || true'

  # ── Installa il nodo (Node.js 20, ffmpeg, repo, systemd) come utente ubuntu ──
  #    URL pinnato a un commit revisionato (NON 'main'): la VM esegue una versione esatta.
  - sudo -u ubuntu -H bash -c 'cd /home/ubuntu && curl -fsSL https://raw.githubusercontent.com/H8dboy/m4tr1x-node/f20eb81e175e04845cb314019f8b3e5af921e916/scripts/install-node.sh -o install-node.sh && HEAD_NODE_URL=http://127.0.0.1:8081 NODE_NAME=oracle-node-1 INSTALL_DIR=/home/ubuntu/m4tr1x-node bash install-node.sh'

  # ── Genera una M4TR1X_API_KEY casuale nel .env e riavvia il nodo ──
  - |
    ENV=/home/ubuntu/m4tr1x-node/.env
    if [ ! -f "$ENV" ]; then
      echo "[cloud-init] $ENV assente: install-node.sh non è andato a buon fine — salto la API key" >&2
      exit 0
    fi
    KEY=$(openssl rand -hex 32)
    if grep -q '^M4TR1X_API_KEY=' "$ENV"; then
      sed -i "s|^M4TR1X_API_KEY=.*|M4TR1X_API_KEY=$KEY|" "$ENV"
    else
      echo "M4TR1X_API_KEY=$KEY" >> "$ENV"
    fi
    chown ubuntu:ubuntu "$ENV"
    systemctl restart m4tr1x-node || true

  # ── Head server (directory + dashboard) — SOLO LOCALE (127.0.0.1:8081) ──
  - |
    cat > /etc/systemd/system/m4tr1x-head.service <<'EOF'
    [Unit]
    Description=M4TR1X Head Server — node directory and dashboard (local only)
    After=network-online.target
    Wants=network-online.target

    [Service]
    Type=simple
    User=ubuntu
    WorkingDirectory=/home/ubuntu/m4tr1x-node/head-server
    Environment=HOST=127.0.0.1
    Environment=PORT=8081
    Environment=M4TR1X_DATA_DIR=/home/ubuntu/m4tr1x-head-data
    ExecStart=/usr/bin/node head_server.js
    Restart=on-failure
    RestartSec=5
    NoNewPrivileges=true
    PrivateTmp=true

    [Install]
    WantedBy=multi-user.target
    EOF
  - mkdir -p /home/ubuntu/m4tr1x-head-data
  - chown ubuntu:ubuntu /home/ubuntu/m4tr1x-head-data
  - systemctl daemon-reload
  - systemctl enable --now m4tr1x-head

final_message: "M4TR1X pronto: relay :4848 (pubblico) · nodo :8080 e head :8081 (LOCALI, via tunnel SSH). API key in /home/ubuntu/m4tr1x-node/.env"
